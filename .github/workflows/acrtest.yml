name: acrtest
on: push
permissions:
  id-token: write
  contents: read
jobs:
  decode-env:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Decode OIDC token claims (environment job)
        run: |
          T=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r .value)
          echo "$T" | cut -d. -f2 | base64 -d 2>/dev/null | jq '{sub, iss, aud, repository, repository_owner}' || \
          echo "$T" | cut -d. -f2 | base64 --decode 2>/dev/null
  decode-noenv:
    runs-on: ubuntu-latest
    steps:
      - name: Decode OIDC token claims (no environment)
        run: |
          T=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r .value)
          echo "$T" | cut -d. -f2 | base64 -d 2>/dev/null | jq '{sub, iss, aud, repository, repository_owner}' || true
