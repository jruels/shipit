name: CD
on:
  workflow_run:
    workflows: ["CI"]        # your CI workflow (built in Module 2, pushes SHA-tagged images since Module 3)
    types: [completed]
    branches: [main]

permissions:
  id-token: write            # required to request an OIDC token
  contents: read

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging
    env:
      SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy image to staging
        run: |
          az containerapp update -n shipit-staging -g "$RG" \
            --image "$ACR.azurecr.io/shipit:$SHA"
        env:
          RG: ${{ vars.RG }}
          ACR: ${{ vars.ACR }}
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production        # run pauses here for the required reviewer
    steps:
      - uses: actions/checkout@v5
      - uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: azure/aks-set-context@v5
        with:
          resource-group: ${{ vars.RG }}
          cluster-name: ${{ vars.AKS }}
      - name: Deploy with Helm
        id: deploy
        continue-on-error: true
        run: |
          helm upgrade --install shipit charts/shipit \
            --set image.tag=${{ github.sha }} --wait
      - name: Roll back on failure
        if: steps.deploy.outcome == 'failure'
        run: |
          echo "::error::Deploy failed readiness. Rolling back to the previous Helm release."
          helm rollback shipit
          exit 1